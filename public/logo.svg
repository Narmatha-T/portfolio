<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!--
    South Indian Neli Kolam — 5-pulli diamond grid
    Transparent background, white strokes & dots
    Grid spacing: 40px, center: (200,200)

    Dot positions (diamond layout):
    (200,80)
    (160,120) (200,120) (240,120)
    (120,160) (160,160) (240,160) (280,160)
    (80,200)  (120,200) (200,200) (280,200) (320,200)
    (120,240) (160,240) (240,240) (280,240)
    (160,280) (200,280) (240,280)
    (200,320)
  -->

  <defs>
    <style>
      .weave { fill: none; stroke: #ffffff; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .dot   { fill: #ffffff; }
    </style>
  </defs>

  <!-- ════════════════════════════════════════════════
       KOLAM WEAVE — interlocking figure-8 loops
       ════════════════════════════════════════════════ -->
  <g class="weave">

    <!-- ─── CENTER MEDALLION ─── -->
    <circle cx="200" cy="200" r="24"/>

    <!-- ─── INNER RING: 4 FIGURE-8 LOOPS (cardinal) ─── -->

    <!-- Top vertical loop: wraps (200,120) & (200,80) -->
    <path d="
      M 200,176
      C 182,176 172,152 172,136
      C 172,112 184,96 200,80
      C 216,96 228,112 228,136
      C 228,152 218,176 200,176 Z
    "/>
    <path d="
      M 200,176
      C 188,164 184,148 184,136
      C 184,120 192,108 200,100
      C 208,108 216,120 216,136
      C 216,148 212,164 200,176 Z
    "/>

    <!-- Bottom vertical loop: wraps (200,280) & (200,320) -->
    <path d="
      M 200,224
      C 218,224 228,248 228,264
      C 228,288 216,304 200,320
      C 184,304 172,288 172,264
      C 172,248 182,224 200,224 Z
    "/>
    <path d="
      M 200,224
      C 212,236 216,252 216,264
      C 216,280 208,292 200,300
      C 192,292 184,280 184,264
      C 184,252 188,236 200,224 Z
    "/>

    <!-- Left horizontal loop: wraps (120,200) & (80,200) -->
    <path d="
      M 176,200
      C 176,182 152,172 136,172
      C 112,172 96,184 80,200
      C 96,216 112,228 136,228
      C 152,228 176,218 176,200 Z
    "/>
    <path d="
      M 176,200
      C 164,188 148,184 136,184
      C 120,184 108,192 100,200
      C 108,208 120,216 136,216
      C 148,216 164,212 176,200 Z
    "/>

    <!-- Right horizontal loop: wraps (280,200) & (320,200) -->
    <path d="
      M 224,200
      C 224,218 248,228 264,228
      C 288,228 304,216 320,200
      C 304,184 288,172 264,172
      C 248,172 224,182 224,200 Z
    "/>
    <path d="
      M 224,200
      C 236,212 252,216 264,216
      C 280,216 292,208 300,200
      C 292,192 280,184 264,184
      C 252,184 236,188 224,200 Z
    "/>

    <!-- ─── DIAGONAL LOOPS (NW, NE, SW, SE) ─── -->

    <!-- NW loop: wraps (160,160) -->
    <path d="
      M 180,180
      C 168,168 152,156 140,148
      C 128,140 116,140 112,152
      C 108,164 116,176 128,184
      C 140,192 164,192 180,180 Z
    "/>
    <path d="
      M 180,180
      C 168,168 156,152 148,140
      C 140,128 140,116 152,112
      C 164,108 176,116 184,128
      C 192,140 192,164 180,180 Z
    "/>

    <!-- NE loop: wraps (240,160) -->
    <path d="
      M 220,180
      C 232,168 248,156 260,148
      C 272,140 284,140 288,152
      C 292,164 284,176 272,184
      C 260,192 236,192 220,180 Z
    "/>
    <path d="
      M 220,180
      C 232,168 244,152 252,140
      C 260,128 260,116 248,112
      C 236,108 224,116 216,128
      C 208,140 208,164 220,180 Z
    "/>

    <!-- SW loop: wraps (160,240) -->
    <path d="
      M 180,220
      C 168,232 152,244 140,252
      C 128,260 116,260 112,248
      C 108,236 116,224 128,216
      C 140,208 164,208 180,220 Z
    "/>
    <path d="
      M 180,220
      C 168,232 156,248 148,260
      C 140,272 140,284 152,288
      C 164,292 176,284 184,272
      C 192,260 192,236 180,220 Z
    "/>

    <!-- SE loop: wraps (240,240) -->
    <path d="
      M 220,220
      C 232,232 248,244 260,252
      C 272,260 284,260 288,248
      C 292,236 284,224 272,216
      C 260,208 236,208 220,220 Z
    "/>
    <path d="
      M 220,220
      C 232,232 244,248 252,260
      C 260,272 260,284 248,288
      C 236,292 224,284 216,272
      C 208,260 208,236 220,220 Z
    "/>

    <!-- ─── OUTER CONNECTING ARCS ─── -->

    <!-- NW arc: top loop to left loop -->
    <path d="
      M 172,136
      C 162,118 140,104 120,104
      C 100,104 88,116 88,136
      C 88,156 104,168 120,172
    "/>
    <path d="
      M 184,148
      C 176,132 160,120 148,116
      C 132,112 120,120 118,134
      C 116,148 126,160 140,168
    "/>

    <!-- NE arc -->
    <path d="
      M 228,136
      C 238,118 260,104 280,104
      C 300,104 312,116 312,136
      C 312,156 296,168 280,172
    "/>
    <path d="
      M 216,148
      C 224,132 240,120 252,116
      C 268,112 280,120 282,134
      C 284,148 274,160 260,168
    "/>

    <!-- SW arc -->
    <path d="
      M 172,264
      C 162,282 140,296 120,296
      C 100,296 88,284 88,264
      C 88,244 104,232 120,228
    "/>
    <path d="
      M 184,252
      C 176,268 160,280 148,284
      C 132,288 120,280 118,266
      C 116,252 126,240 140,232
    "/>

    <!-- SE arc -->
    <path d="
      M 228,264
      C 238,282 260,296 280,296
      C 300,296 312,284 312,264
      C 312,244 296,232 280,228
    "/>
    <path d="
      M 216,252
      C 224,268 240,280 252,284
      C 268,288 280,280 282,266
      C 284,252 274,240 260,232
    "/>

    <!-- ─── CORNER TEARDROPS ─── -->

    <!-- Top teardrop at (200,80) -->
    <path d="
      M 192,92
      C 188,78 190,62 200,52
      C 210,62 212,78 208,92
    "/>

    <!-- Bottom teardrop at (200,320) -->
    <path d="
      M 192,308
      C 188,322 190,338 200,348
      C 210,338 212,322 208,308
    "/>

    <!-- Left teardrop at (80,200) -->
    <path d="
      M 92,192
      C 78,188 62,190 52,200
      C 62,210 78,212 92,208
    "/>

    <!-- Right teardrop at (320,200) -->
    <path d="
      M 308,192
      C 322,188 338,190 348,200
      C 338,210 322,212 308,208
    "/>

    <!-- NW corner teardrops -->
    <path d="
      M 112,124
      C 100,112 98,96 108,88
      C 118,80 130,88 132,104
    "/>
    <path d="
      M 124,112
      C 112,100 96,98 88,108
      C 80,118 88,130 104,132
    "/>

    <!-- NE corner teardrops -->
    <path d="
      M 288,124
      C 300,112 302,96 292,88
      C 282,80 270,88 268,104
    "/>
    <path d="
      M 276,112
      C 288,100 304,98 312,108
      C 320,118 312,130 296,132
    "/>

    <!-- SW corner teardrops -->
    <path d="
      M 112,276
      C 100,288 98,304 108,312
      C 118,320 130,312 132,296
    "/>
    <path d="
      M 124,288
      C 112,300 96,302 88,292
      C 80,282 88,270 104,268
    "/>

    <!-- SE corner teardrops -->
    <path d="
      M 288,276
      C 300,288 302,304 292,312
      C 282,320 270,312 268,296
    "/>
    <path d="
      M 276,288
      C 288,300 304,302 312,292
      C 320,282 312,270 296,268
    "/>

  </g>

  <!-- ════════════════════════════════════════════════
       GRID DOTS — rendered on top of all paths
       ════════════════════════════════════════════════ -->
  <g class="dot">
    <circle cx="200" cy="80"  r="4.5"/>

    <circle cx="160" cy="120" r="4.5"/>
    <circle cx="200" cy="120" r="4.5"/>
    <circle cx="240" cy="120" r="4.5"/>

    <circle cx="120" cy="160" r="4.5"/>
    <circle cx="160" cy="160" r="4.5"/>
    <circle cx="240" cy="160" r="4.5"/>
    <circle cx="280" cy="160" r="4.5"/>

    <circle cx="80"  cy="200" r="4.5"/>
    <circle cx="120" cy="200" r="4.5"/>
    <circle cx="200" cy="200" r="4.5"/>
    <circle cx="280" cy="200" r="4.5"/>
    <circle cx="320" cy="200" r="4.5"/>

    <circle cx="120" cy="240" r="4.5"/>
    <circle cx="160" cy="240" r="4.5"/>
    <circle cx="240" cy="240" r="4.5"/>
    <circle cx="280" cy="240" r="4.5"/>

    <circle cx="160" cy="280" r="4.5"/>
    <circle cx="200" cy="280" r="4.5"/>
    <circle cx="240" cy="280" r="4.5"/>

    <circle cx="200" cy="320" r="4.5"/>
  </g>

</svg>
